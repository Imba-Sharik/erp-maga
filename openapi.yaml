  /api/v1/projects/{id}/transition/:
    post:
      operationId: projects_transition_create
      description: POST /transition/ вАФ alias; –њ—А–µ–і–њ–Њ—З—В–Є—В–µ–ї—М–љ–Њ /transitions/.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/transitions/:
    post:
      operationId: projects_transitions_create
      description: '–°–Њ—Е—А–∞–љ—П–µ—В –њ–Њ–ї—П —В–µ–Ї—Г—Й–µ–≥–Њ —Н—В–∞–њ–∞ –Є –њ–µ—А–µ–≤–Њ–і–Є—В –њ—А–Њ–µ–Ї—В –≤ `to_stage`.
        –Ґ–µ–ї–Њ –њ–ї–Њ—Б–Ї–Њ–µ: `{ to_stage, ...–њ–Њ–ї—П }`. –°–Љ. docs/api/stages.md.'
      summary: –Я–µ—А–µ—Е–Њ–і –љ–∞ —Б–ї–µ–і—Г—О—Й–Є–є —Н—В–∞–њ
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectTransitionRequest'
            examples:
              PlumRequestвЖТPrimaryContactDone:
                value:
                  to_stage: primary_contact_done
                  client_company: –Ю–Ю–Ю –†–Њ–Љ–∞—И–Ї–∞
                  phone: '+79991234567'
                  contact_person: –Ш–≤–∞–љ –Ш–≤–∞–љ–Њ–≤
                  email: ivan@example.com
                summary: plum_request вЖТ primary_contact_done
              PrimaryContactDoneвЖТCalculationPrepared:
                value:
                  to_stage: calculation_prepared
                  contact_comment: –°–Њ–Ј–≤–Њ–љ–Є–ї–Є—Б—М, –ґ–і—С–Љ –Ґ–Ч
                  contact_channel: phone
                summary: primary_contact_done вЖТ calculation_prepared
              CalculationPreparedвЖТContractSigned:
                value:
                  to_stage: contract_signed
                  calculation_comment: –°–Љ–µ—В–∞ —Б–Њ–≥–ї–∞—Б–Њ–≤–∞–љ–∞ —Б –Ї–ї–Є–µ–љ—В–Њ–Љ
                summary: calculation_prepared вЖТ contract_signed
              ContractSignedвЖТReadyToEvent:
                value:
                  to_stage: ready_to_event
                  contract_type: with_vat
                  contract_number: MAG-2026-042
                  contract_date: '2026-05-01'
                  legal_entity: –Ю–Ю–Ю MAG
                  contract_comment: –Ф–Њ–≥–Њ–≤–Њ—А –љ–∞ –њ–ї–Њ—Й–∞–і–Ї–µ
                summary: contract_signed вЖТ ready_to_event
              ReadyToEventвЖТEventHeld:
                value:
                  to_stage: event_held
                  tax_rate: 10
                  articles:
                  - block: main
                    kind: equipment
                    sales: 1500000
                  - block: main
                    kind: personnel
                    sales: 350000
                summary: ready_to_event вЖТ event_held
              –Я—А–µ–і–њ—А–Њ–µ–Ї—ВвЖТOutOfMagScope:
                value:
                  to_stage: out_of_mag_scope
                  reason: event_cancelled
                  comment: –Ъ–ї–Є–µ–љ—В –Њ—В–Љ–µ–љ–Є–ї –і–∞—В—Г
                summary: –њ—А–µ–і–њ—А–Њ–µ–Ї—В вЖТ out_of_mag_scope
              OutOfMagScopeвЖТReturnFromOutOfMag:
                value:
                  to_stage: return_from_out_of_mag
                  target_stage: calculation_prepared
                  comment: –Т–µ—А–љ—Г–ї–Є –≤ —А–∞–±–Њ—В—Г
                summary: out_of_mag_scope вЖТ return_from_out_of_mag
              EventHeldвЖТExpensesEntered:
                value:
                  to_stage: expenses_entered
                  post_event_comment: –Ь–µ—А–Њ–њ—А–Є—П—В–Є–µ –њ—А–Њ—И–ї–Њ –±–µ–Ј –Ј–∞–Љ–µ—З–∞–љ–Є–є
                summary: event_held вЖТ expenses_entered
              ExpensesEnteredвЖТDocumentsConfirmed:
                value:
                  to_stage: documents_confirmed
                  expenses_comment: –†–∞—Б—Е–Њ–і—Л —Б–≤–µ—А–µ–љ—Л —Б –±—Г—Е–≥–∞–ї—В–µ—А–Є–µ–є
                  articles:
                  - block: main
                    kind: equipment
                    expense: 800000
                  - block: main
                    kind: personnel
                    expense: 200000
                summary: expenses_entered вЖТ documents_confirmed
              DocumentsConfirmedвЖТFeedbackReceived:
                value:
                  to_stage: feedback_received
                  project_docs_status: present
                  sublease_docs_status: not_required
                  staff_receipts_status: present
                summary: documents_confirmed вЖТ feedback_received
              FeedbackReceivedвЖТDataConfirmed:
                value:
                  to_stage: data_confirmed
                summary: feedback_received вЖТ data_confirmed
              DataConfirmedвЖТBonusCalculated:
                value:
                  to_stage: bonus_calculated
                  data_confirmed_status: confirmed
                summary: data_confirmed вЖТ bonus_calculated
              BonusCalculatedвЖТBonusApproved:
                value:
                  to_stage: bonus_approved
                  articles:
                  - block: main
                    kind: equipment
                    bonus_amount: 70000
                summary: bonus_calculated вЖТ bonus_approved
              BonusApprovedвЖТClosed:
                value:
                  to_stage: closed
                summary: bonus_approved вЖТ closed
              RejectData(–Њ—В–Ї–∞—В–Ф–∞–љ–љ—Л—Е):
                value:
                  to_stage: reject_data
                summary: reject_data (–Њ—В–Ї–∞—В –і–∞–љ–љ—Л—Е)
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectTransitionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectTransitionRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailSchema'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
  /api/v1/projects/legal-entities/:
    get:
