    ProjectRequest:
      type: object
      properties:
        client_company:
          type: string
          title: Клиент / название компании (редактируемое)
          maxLength: 500
        contact_person:
          type: string
          title: Контактное лицо (редактируемое)
          maxLength: 500
        phone:
          type: string
          title: Телефон (редактируемый)
          maxLength: 64
        email:
          type: string
          format: email
          title: Email (редактируемый)
          maxLength: 254
    StageEnum:
      enum:
      - plum_request
      - primary_contact_done
      - calculation_prepared
      - contract_signed
      - ready_to_event
      - event_held
      - expenses_entered
      - documents_confirmed
      - feedback_received
      - data_confirmed
      - bonus_calculated
      - bonus_approved
      - closed
      - archived
      - out_of_mag_scope
      type: string
      description: |-
        * `plum_request` - Заявка из Plum
        * `primary_contact_done` - Первичный контакт выполнен
        * `calculation_prepared` - Расчёт подготовлен
        * `contract_signed` - Договор подписан
        * `ready_to_event` - Готов к проведению
        * `event_held` - Мероприятие проведено
        * `expenses_entered` - Расходы внесены
        * `documents_confirmed` - Документы подтверждены
        * `feedback_received` - Обратная связь по проекту получена
        * `data_confirmed` - Данные подтверждены
        * `bonus_calculated` - Бонус рассчитан
        * `bonus_approved` - Бонус утверждён
        * `closed` - Проект закрыт
        * `archived` - Архив
        * `out_of_mag_scope` - Вне контура MAG
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    TokenVerifyRequest:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - token
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        username:
          type: string
          readOnly: true
          title: Имя пользователя
          description: Обязательное поле. Не более 150 символов. Только буквы, цифры
            и символы @/./+/-/_.
        first_name:
          type: string
          readOnly: true
          title: Имя
        last_name:
          type: string
          readOnly: true
          title: Фамилия
        role:
          type: string
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
          title: Статус персонала
          description: Отметьте, если пользователь может входить в административную
            часть сайта.
        date_joined:
          type: string
          format: date-time
          readOnly: true
          title: Дата регистрации
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date_joined
      - email
      - first_name
      - id
      - is_staff
      - last_name
      - role
      - updated_at
      - username
