      - telegram
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramLinkResponse'
          description: ''
    delete:
      operationId: telegram_link_destroy
      description: Очищает telegram_id, telegram_username и telegram_chat_id у текущего
