      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
        - access
        - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
        - refresh
    TokenVerifyRequest:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
          minLength: 1
      required:
        - token
    TransitionArticleRequest:
      type: object
      properties:
        block:
          $ref: '#/components/schemas/BlockEnum'
        kind:
          $ref: '#/components/schemas/KindEnum'
        sales:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          description: Этап ready_to_event → event_held
        expense:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          description: Этап expenses_entered → documents_confirmed
        bonus_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          description: Этап bonus_calculated → bonus_approved (override)
      required:
        - block
        - kind
    UserBrief:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
      required:
        - full_name
        - id
    UserMeSchema:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        username:
          type: string
          readOnly: true
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        role:
          allOf:
            - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
          description: |-
            Роль для UI (manager_mag→manager, lead→director)

            * `manager` - manager
            * `director` - director
            * `accountant` - accountant
            * `admin` - admin
        is_staff:
          type: boolean
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - created_at
        - date_joined
        - email
        - first_name
        - id
        - is_staff
        - last_name
        - role
        - updated_at
        - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
