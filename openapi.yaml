openapi: 3.0.3
info:
  title: MAG Backend API
  version: 1.0.0
  description: REST API v1 (JWT).
paths:
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/projects/:
    get:
      operationId: projects_list
      description: 'Список проектов. Query: event_date_after, event_date_before, stage,
        limit, offset.'
      parameters:
      - in: query
        name: event_date_after
        schema:
          type: string
          format: date
      - in: query
        name: event_date_before
        schema:
          type: string
          format: date
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: stage
        schema:
          type: string
          enum:
          - archived
          - bonus_approved
          - bonus_calculated
          - calculation_prepared
          - closed
          - contract_signed
          - data_confirmed
          - documents_confirmed
          - event_held
          - expenses_entered
          - feedback_received
          - out_of_mag_scope
          - plum_request
          - primary_contact_done
          - ready_to_event
        description: |-
          * `plum_request` - Заявка из Plum
          * `primary_contact_done` - Первичный контакт выполнен
          * `calculation_prepared` - Расчёт подготовлен
          * `contract_signed` - Договор подписан
          * `ready_to_event` - Готов к проведению
          * `event_held` - Мероприятие проведено
          * `expenses_entered` - Расходы внесены
          * `documents_confirmed` - Документы подтверждены
          * `feedback_received` - Обратная связь по проекту получена
          * `data_confirmed` - Данные подтверждены
          * `bonus_calculated` - Бонус рассчитан
          * `bonus_approved` - Бонус утверждён
          * `closed` - Проект закрыт
          * `archived` - Архив
          * `out_of_mag_scope` - Вне контура MAG
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectList'
          description: ''
  /api/v1/projects/{id}/:
    get:
      operationId: projects_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
          description: ''
    put:
      operationId: projects_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
    patch:
      operationId: projects_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
