  description: Привязка Telegram и webhook бота
- name: websocket
  description: WebSocket-протокол (см. x-mag-websocket)
x-mag-websocket:
  notifications:
    url: ws://{host}/ws/notifications/?token={access_jwt}
    auth:
    - 'Query: ?token=<access_jwt>'
    - 'Header: Authorization: Bearer <access_jwt>'
    clientSend:
      $ref: '#/components/schemas/WsClientMessage'
    serverReceive:
      $ref: '#/components/schemas/WsServerMessage'
    notes: 'REST-дубликат: GET /api/v1/notifications/, POST /api/v1/notifications/mark-read/'
