          maxLength: 64
        email:
          type: string
          format: email
          title: Email (редактируемый)
          maxLength: 254
    ProjectTransitionRequest:
      type: object
      description: |-
        Плоское тело POST /projects/{id}/transitions/.
        Обязателен to_stage; остальные поля — по таблице этапов (см. stages.md).
      properties:
        to_stage:
          allOf:
            - $ref: '#/components/schemas/ToStageEnum'
          description: |-
            Следующая стадия или действие: reject_data, return_from_out_of_mag

            * `plum_request` - Заявка из Plum
            * `primary_contact_done` - Первичный контакт выполнен
            * `calculation_prepared` - Расчёт подготовлен
            * `contract_signed` - Договор подписан
            * `ready_to_event` - Готов к проведению
            * `event_held` - Мероприятие проведено
            * `expenses_entered` - Расходы внесены
            * `documents_confirmed` - Документы подтверждены
            * `feedback_received` - Обратная связь по проекту получена
            * `data_confirmed` - Данные подтверждены
            * `bonus_calculated` - Бонус рассчитан
            * `bonus_approved` - Бонус утверждён
            * `closed` - Проект закрыт
            * `archived` - Архив
            * `out_of_mag_scope` - Вне контура MAG
            * `reject_data` - Отклонить данные (откат)
            * `return_from_out_of_mag` - Вернуть из «Вне контура MAG»
        target_stage:
          allOf:
            - $ref: '#/components/schemas/TargetStageEnum'
          description: |-
            Alias для to_stage (обязателен при return_from_out_of_mag)

            * `plum_request` - Заявка из Plum
            * `primary_contact_done` - Первичный контакт выполнен
            * `calculation_prepared` - Расчёт подготовлен
            * `contract_signed` - Договор подписан
            * `ready_to_event` - Готов к проведению
            * `event_held` - Мероприятие проведено
            * `expenses_entered` - Расходы внесены
            * `documents_confirmed` - Документы подтверждены
            * `feedback_received` - Обратная связь по проекту получена
            * `data_confirmed` - Данные подтверждены
            * `bonus_calculated` - Бонус рассчитан
            * `bonus_approved` - Бонус утверждён
            * `closed` - Проект закрыт
            * `archived` - Архив
            * `out_of_mag_scope` - Вне контура MAG
            * `reject_data` - Отклонить данные (откат)
            * `return_from_out_of_mag` - Вернуть из «Вне контура MAG»
        client_company:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        contact_person:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
        contact_comment:
          type: string
          minLength: 1
        contact_channel:
          allOf:
            - $ref: '#/components/schemas/ContactChannelEnum'
          description: |-
            phone на API = call в БД

            * `messenger` - messenger
            * `phone` - phone
            * `meeting` - meeting
        calculation_comment:
          type: string
          minLength: 1
        contract_type:
          $ref: '#/components/schemas/ContractTypeEnum'
        contract_number:
          type: string
          minLength: 1
        contract_date:
          type: string
          format: date
        legal_entity:
          type: string
          minLength: 1
          description: Название юрлица (строка; справочник legal-entities пока не
            обязателен)
        legal_entity_name:
          type: string
          minLength: 1
          description: Alias для legal_entity
        legal_entity_id:
          type: integer
          description: 'Опционально: id из справочника, если есть'
        contract_comment:
          type: string
          minLength: 1
        tax_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
