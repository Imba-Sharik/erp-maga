        event_type:
          type: string
          enum:
          - project_created
          - stage_changed
          - out_of_mag
          - bonus_approved
          - data_rejected
          - manager_assigned
          - documents_uploaded
          - documents_re_requested
          - documents_reuploaded
          - other
        title:
          type: string
        message:
          type: string
        payload:
          type: object
          additionalProperties: true
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    WsClientMessage:
      type: object
      required:
      - action
      properties:
        action:
          type: string
          enum:
          - mark_read
          - ping
        ids:
          type: array
          items:
            type: integer
          description: Для mark_read; пусто — все непрочитанные
    WsServerMessage:
      oneOf:
      - $ref: '#/components/schemas/WsConnectedMessage'
      - $ref: '#/components/schemas/WsNotificationMessage'
      - $ref: '#/components/schemas/WsMarkedReadMessage'
      - $ref: '#/components/schemas/WsPongMessage'
    WsConnectedMessage:
      type: object
      required:
      - type
      - unread_count
      - items
      properties:
        type:
          type: string
          enum:
          - connected
        unread_count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/WsNotificationPayload'
    WsNotificationMessage:
      type: object
      required:
      - type
      - notification
      properties:
        type:
          type: string
          enum:
          - notification
        notification:
          $ref: '#/components/schemas/WsNotificationPayload'
    WsMarkedReadMessage:
      type: object
      required:
      - type
      - count
      properties:
        type:
          type: string
          enum:
          - marked_read
        count:
          type: integer
    WsPongMessage:
      type: object
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - pong
