openapi: 3.0.3
info:
  title: MAG Backend API
  version: 1.0.0
  description: REST API v1 (JWT). WebSocket — extension `x-mag-websocket`, компоненты
    `Ws*`.
paths:
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      summary: Получить JWT (email + password)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainRequestRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      summary: Обновить access-токен
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
          description: ''
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      summary: Проверить токен
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/halls/hall-manager-assignments/:
    get:
      operationId: halls_manager_assignments_list
      summary: Матрица зал/лофт → менеджер MAG
      tags:
      - halls
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
    post:
      operationId: halls_manager_assignments_create
      summary: Создать назначение менеджера
      tags:
      - halls
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
  /api/v1/halls/hall-manager-assignments/{id}/:
    get:
      operationId: halls_manager_assignments_retrieve
      summary: Назначение менеджера
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - halls
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
    put:
      operationId: halls_manager_assignments_update
      summary: Заменить назначение
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - halls
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
    patch:
      operationId: halls_manager_assignments_partial_update
      summary: Изменить назначение
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - halls
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedHallManagerAssignmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedHallManagerAssignmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedHallManagerAssignmentRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
    delete:
      operationId: halls_manager_assignments_destroy
      summary: Удалить назначение
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - halls
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
