                  legal_entity: ООО MAG
                  contract_comment: Договор на площадке
                summary: contract_signed → ready_to_event
              ContractSigned→ReadyToEvent(безПолейДоговора):
                value:
                  to_stage: ready_to_event
                summary: contract_signed → ready_to_event (без полей договора)
              ReadyToEvent→EventHeld:
                value:
                  to_stage: event_held
                  tax_rate: 10
                  articles:
                  - block: main
                    kind: equipment
                    sales: 1500000
                  - block: main
                    kind: personnel
                    sales: 350000
                summary: ready_to_event → event_held
              Предпроект→OutOfMagScope:
                value:
                  to_stage: out_of_mag_scope
                  reason: event_cancelled
                  comment: Клиент отменил дату
                summary: предпроект → out_of_mag_scope
              OutOfMagScope→ReturnFromOutOfMag:
                value:
                  to_stage: return_from_out_of_mag
                  target_stage: calculation_prepared
                  comment: Вернули в работу
                summary: out_of_mag_scope → return_from_out_of_mag
              EventHeld→ExpensesEntered:
                value:
                  to_stage: expenses_entered
                  post_event_comment: Мероприятие прошло без замечаний
                summary: event_held → expenses_entered
              ExpensesEntered→DocumentsConfirmed:
                value:
                  to_stage: documents_confirmed
                  expenses_comment: Расходы сверены с бухгалтерией
                  articles:
                  - block: main
                    kind: equipment
                    expense: 800000
                  - block: main
                    kind: personnel
                    expense: 200000
                summary: expenses_entered → documents_confirmed
              DocumentsConfirmed→DataConfirmed(всеСтатусыОпциональны):
                value:
                  to_stage: data_confirmed
                  project_docs_status: present
                  sublease_docs_status: ''
                  staff_receipts_status: present
                summary: documents_confirmed → data_confirmed (все статусы опциональны)
              FeedbackReceived→DataConfirmed(legacy):
                value:
                  to_stage: data_confirmed
                summary: feedback_received → data_confirmed (legacy)
              DataConfirmed→BonusCalculated:
                value:
                  to_stage: bonus_calculated
                  data_confirmed_status: confirmed
                summary: data_confirmed → bonus_calculated
              BonusCalculated→BonusApproved:
                value:
                  to_stage: bonus_approved
                  articles:
                  - block: main
                    kind: equipment
                    bonus_amount: 70000
                summary: bonus_calculated → bonus_approved
              BonusCalculated→BonusApproved(ручнаяСумма):
                value:
                  to_stage: bonus_approved
                  approved_bonus: '87500.00'
                  adjustment_reason: Корректировка по согласованию с руководителем
                summary: bonus_calculated → bonus_approved (ручная сумма)
              BonusApproved→Closed:
                value:
                  to_stage: closed
                summary: bonus_approved → closed
              RejectData(откатДанных):
                value:
                  to_stage: reject_data
                summary: reject_data (откат данных)
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectTransitionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectTransitionRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
  /api/v1/projects/calendar/:
    get:
      operationId: projects_calendar_list
      description: |-
        Отдельная ручка под UI календаря (не общий список `/projects/`).

        **Период** — один из вариантов:
        - `?year=2026&month=5` — весь календарный месяц по `event_date`;
        - `?event_date_after=2026-05-01&event_date_before=2026-05-31` — произвольный диапазон.

        Без пагинации. Проекты в стадии `out_of_mag_scope` не возвращаются (см. `GET /projects/out-of-mag/`).

        **Доступ:** manager_mag — только свои проекты; lead, accountant, admin — все; lead/admin могут сузить выборку `mag_manager=<user_id>`.

        В `results`: event_type, event_type_label, client_company, phone, halls[] — залы проекта (внутренние hall_id / loft_id MAG; данные из каталога и ProjectEventHall). При отсутствии зала в каталоге — sync_error на проекте.
      summary: 'Календарь: проекты за месяц / период'
      parameters:
      - in: query
        name: event_date_after
        schema:
          type: string
          format: date
        description: Начало периода (ISO date), альтернатива year+month
      - in: query
        name: event_date_before
        schema:
          type: string
          format: date
        description: Конец периода (ISO date), вместе с event_date_after
      - in: query
        name: mag_manager
        schema:
          type: integer
        description: Фильтр по менеджеру MAG (только lead, admin)
      - in: query
        name: month
        schema:
          type: integer
        description: Месяц 1–12 (обязателен вместе с year)
      - in: query
        name: year
        schema:
          type: integer
        description: Год периода (вместе с month — все проекты за календарный месяц)
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCalendarResponseSchema'
              examples:
                ОтветКалендаря:
                  value:
                    period_start: '2026-05-01'
                    period_end: '2026-05-31'
                    count: 1
                    results:
                    - id: 1
                      event_name: Свадьба Ивановых
                      event_date: '2026-05-10'
                      event_type: 2
                      event_type_label: Свадьба
                      client_company: ООО Ромашка
                      phone: +7 999 000-00-00
                      halls:
                      - hall_id: 10
                        hall_name: Зал A
                        loft_id: 2
                        loft_name: Loft Центр
                      - hall_id: 11
                        hall_name: Зал B
                        loft_id: 2
                        loft_name: Loft Центр
                      plum_lofthall_manager: Петров
                      stage: calculation_prepared
                      stage_label: Расчёт подготовлен
                      mag_manager:
                        id: 5
                        full_name: Иванов Иван
                        email: ivan@example.com
                  summary: Ответ календаря
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
