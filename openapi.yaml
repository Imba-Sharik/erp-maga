  /api/v1/projects/out-of-mag/:
    get:
      operationId: projects_out_of_mag_list
      description: 'Доступ: lead, admin. Пагинация: limit, offset (LimitOffset, по
        умолчанию limit=10). Элемент списка — `OutOfMagProjectSerializer` (все поля
        `Project` + stage_from, out_of_mag_reason, out_of_mag_transferred_at, out_of_mag_transferred_by).'
      summary: Список проектов «Вне контура MAG»
      parameters:
      - in: query
        name: archived_only
        schema:
          type: boolean
      - in: query
        name: event_date_after
        schema:
          type: string
          format: date
      - in: query
        name: event_date_before
        schema:
          type: string
          format: date
      - in: query
        name: hall
        schema:
          type: string
        description: Подстрока в названии зала
      - in: query
        name: hall_id
        schema:
          type: integer
        description: Фильтр по id зала в halls[]
      - in: query
        name: limit
        schema:
          type: integer
      - in: query
        name: loft
        schema:
          type: string
        description: Подстрока в названии лофта
      - in: query
        name: loft_id
        schema:
          type: integer
        description: Фильтр по id лофта в halls[]
      - in: query
        name: mag_manager
        schema:
          type: integer
      - in: query
        name: offset
        schema:
          type: integer
      - in: query
        name: ordering
        schema:
          type: string
      - in: query
        name: out_of_mag_reason
        schema:
          type: string
      - in: query
        name: plum_event_status
        schema:
          type: number
      - in: query
        name: plum_event_status__in
        schema:
          type: string
      - in: query
        name: search
        schema:
          type: string
      - in: query
        name: stage
        schema:
          type: string
          enum:
          - archived
          - bonus_approved
          - bonus_calculated
          - calculation_prepared
          - closed
          - contract_signed
          - data_confirmed
          - documents_confirmed
          - event_held
          - expenses_entered
          - feedback_received
          - out_of_mag_scope
          - plum_request
          - primary_contact_done
          - ready_to_event
        description: |-
          * `plum_request` - Заявка из Plum
          * `primary_contact_done` - Первичный контакт выполнен
          * `calculation_prepared` - Расчёт подготовлен
          * `contract_signed` - Договор подписан
          * `ready_to_event` - Готов к проведению
          * `event_held` - Мероприятие проведено
          * `expenses_entered` - Расходы внесены
          * `documents_confirmed` - Документы подтверждены
          * `feedback_received` - Обратная связь по проекту получена
          * `data_confirmed` - Данные подтверждены
          * `bonus_calculated` - Бонус рассчитан
          * `bonus_approved` - Бонус утверждён
          * `closed` - Проект закрыт
          * `archived` - Архив
          * `out_of_mag_scope` - Вне контура MAG
      - in: query
        name: transferred_at_after
        schema:
          type: string
          format: date-time
      - in: query
        name: transferred_at_before
        schema:
          type: string
          format: date-time
      - in: query
        name: transferred_by
        schema:
          type: integer
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOutOfMagProjectList'
          description: ''
  /api/v1/telegram/link/:
