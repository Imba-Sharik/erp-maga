openapi: 3.0.3
info:
  title: MAG Backend API
  version: 1.0.0
  description: REST API v1 (JWT).
paths:
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/projects/:
    get:
      operationId: projects_list
      description: '–§–Є–ї—М—В—А—Л: event_date_after, event_date_before, stage, stage__in,
        plum_status, plum_status__in. –Я–∞–≥–Є–љ–∞—Ж–Є—П: limit, offset.'
      summary: –°–њ–Є—Б–Њ–Ї –њ—А–Њ–µ–Ї—В–Њ–≤
      parameters:
      - in: query
        name: event_date_after
        schema:
          type: string
          format: date
        description: event_date >= (ISO yyyy-MM-dd)
      - in: query
        name: event_date_before
        schema:
          type: string
          format: date
        description: event_date <= (ISO yyyy-MM-dd)
      - in: query
        name: limit
        schema:
          type: integer
      - in: query
        name: offset
        schema:
          type: integer
      - in: query
        name: ordering
        schema:
          type: string
      - in: query
        name: plum_status
        schema:
          type: integer
        description: –°—В–∞—В—Г—Б –Љ–µ—А–Њ–њ—А–Є—П—В–Є—П –≤ Plum (—З–Є—Б–ї–Њ)
      - in: query
        name: plum_status__in
        schema:
          type: string
        description: –Э–µ—Б–Ї–Њ–ї—М–Ї–Њ —Б—В–∞—В—Г—Б–Њ–≤ Plum —З–µ—А–µ–Ј –Ј–∞–њ—П—В—Г—О
      - in: query
        name: stage
        schema:
          type: string
          enum:
          - archived
          - bonus_approved
          - bonus_calculated
          - calculation_prepared
          - closed
          - contract_signed
          - data_confirmed
          - documents_confirmed
          - event_held
          - expenses_entered
          - feedback_received
          - out_of_mag_scope
          - plum_request
          - primary_contact_done
          - ready_to_event
        description: –§–Є–ї—М—В—А –њ–Њ –Њ–і–љ–Њ–є —Б—В–∞–і–Є–Є (–і–ї—П –Ї–Њ–ї–Њ–љ–Њ–Ї –Ї–∞–љ–±–∞–љ–∞)
      - in: query
        name: stage__in
        schema:
          type: string
        description: –Э–µ—Б–Ї–Њ–ї—М–Ї–Њ —Б—В–∞–і–Є–є —З–µ—А–µ–Ј –Ј–∞–њ—П—В—Г—О
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectList'
          description: ''
  /api/v1/projects/{id}/:
    get:
      operationId: projects_retrieve
      summary: –Ъ–∞—А—В–Њ—З–Ї–∞ –њ—А–Њ–µ–Ї—В–∞
