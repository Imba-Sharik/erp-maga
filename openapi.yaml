openapi: 3.0.3
info:
  title: MAG Backend API
  version: 1.0.0
  description: REST API v1 (JWT). WebSocket — extension `x-mag-websocket`, компоненты
    `Ws*`.
paths:
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      summary: Получить JWT (email + password)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainRequestRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      summary: Обновить access-токен
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
          description: ''
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      summary: Проверить токен
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/halls/hall-manager-assignments/:
    get:
      operationId: halls_manager_assignments_list
      description: |-
        Список назначений для редактирования матрицы (lead, admin).

        В выдаче только строки, где менеджер **`role=manager_mag`** и **`is_active=true`** (заблокированные и «снятые» менеджеры не показываются).

        Для отображения списка менеджеров с вложенными `assignments` и метриками используйте **`GET /managers/`**.
      summary: Матрица зал/лофт → менеджер MAG
      tags:
      - halls
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
    post:
      operationId: halls_manager_assignments_create
      summary: Создать назначение менеджера
      tags:
      - halls
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentConflictError'
          description: ''
  /api/v1/halls/hall-manager-assignments/{id}/:
    get:
      operationId: halls_manager_assignments_retrieve
      summary: Назначение менеджера
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - halls
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
    put:
      operationId: halls_manager_assignments_update
      summary: Заменить назначение
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - halls
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HallManagerAssignmentWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentConflictError'
          description: ''
    patch:
      operationId: halls_manager_assignments_partial_update
      summary: Изменить назначение
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - halls
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedHallManagerAssignmentWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedHallManagerAssignmentWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedHallManagerAssignmentWriteRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallManagerAssignment'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentConflictError'
          description: ''
    delete:
      operationId: halls_manager_assignments_destroy
      summary: Удалить назначение
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - halls
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/halls/halls/:
    get:
      operationId: halls_halls_list
      summary: Справочник залов
      parameters:
      - in: query
        name: loft_id
        schema:
          type: integer
        description: Фильтр по внутреннему id лофта MAG.
      tags:
      - halls
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Hall'
          description: ''
  /api/v1/halls/lofts/:
    get:
      operationId: halls_lofts_list
      summary: Справочник лофтов
      tags:
      - halls
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Loft'
          description: ''
  /api/v1/managers/:
    get:
      operationId: managers_directory_list
      description: |-
        Единый список для UI матрицы: профиль, привязки зал/лофт (`assignments` с `label`), счётчики активных/закрытых проектов, суммы продаж и бонусов (all-time).

        **Доступ:** lead, admin, manager_mag.

        **Кто в списке:** только `role=manager_mag` и `is_active=true` (заблокированные / снятые с роли не возвращаются).

        **Счётчики:** активные — все стадии кроме `closed`, `archived`, `out_of_mag_scope`; закрытые — `closed` + `archived`.

        **Суммы (all-time, без `out_of_mag_scope`):**
        - `sales_total` — сумма продаж (subtotal статей, без налога);
        - `net_profit_total` — чистая прибыль из расчёта бонуса, без строки «налог»;
        - `final_bonus_total` — итоговый бонус (`approved_bonus` или `total_bonus` расчёта).

        CRUD назначений: `GET/POST /halls/hall-manager-assignments/`. Не склеивать с `GET /users/?role=manager_mag`.
      summary: Справочник менеджеров MAG (матрица)
      tags:
      - users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ManagerDirectory'
              examples:
                МенеджерСПривязкамиИМетриками:
                  value:
                  - - id: 5
                      email: ivan@example.com
                      first_name: Иван
                      last_name: Иванов
                      full_name: Иван Иванов
                      is_active: true
                      assignments:
                      - id: 12
                        hall:
                          id: 10
                          plum_id: 100
                          name: Зал 1
                        loft:
                          id: 2
                          plum_id: 20
                          name: Loft A
                        label: Loft A — Зал 1
                      - id: 13
                        hall:
                          id: 10
                          plum_id: 100
                          name: Зал 1
                        loft: null
                        label: Зал 1
                      active_projects_count: 4
                      closed_projects_count: 11
                      sales_total: '1250000.00'
                      net_profit_total: '320000.00'
                      final_bonus_total: '87500.00'
                  summary: Менеджер с привязками и метриками
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
  /api/v1/meetings/:
    get:
      operationId: meetings_list
      description: Правая панель календаря встреч. `date=YYYY-MM-DD` фильтрует встречи
        выбранного дня. Поддерживает infinite-scroll пагинацию через `limit` и `offset`.
      summary: Список встреч
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
        description: Дата выбранного дня календаря.
      - in: query
        name: limit
        schema:
          type: integer
        description: Количество записей на страницу (по умолчанию 10, макс. 200).
      - in: query
        name: manager
        schema:
          type: integer
        description: ID менеджера MAG. Доступно lead/admin; менеджер всегда видит
          только себя.
      - in: query
        name: offset
        schema:
          type: integer
        description: Смещение от начала выборки.
      tags:
      - meetings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMeetingListPaginatedList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
    post:
      operationId: meetings_create
      description: Доступно только менеджеру MAG; владелец встречи берётся из текущего
        пользователя.
      summary: Создать встречу
      tags:
      - meetings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MeetingCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MeetingCreateUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
  /api/v1/meetings/{id}/:
    get:
      operationId: meetings_retrieve
      description: Единые правила видимости встреч для календаря, списка и detail.
      summary: Детальная информация о встрече
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - meetings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '404':
          description: Встреча не найдена
    patch:
      operationId: meetings_partial_update
      description: Доступно только менеджеру-владельцу встречи.
      summary: Изменить встречу
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - meetings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMeetingCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMeetingCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMeetingCreateUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '404':
          description: Встреча не найдена
    delete:
      operationId: meetings_destroy
      description: Доступно только менеджеру-владельцу встречи.
      summary: Удалить встречу
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - meetings
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Встреча удалена
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '404':
          description: Встреча не найдена
  /api/v1/meetings/calendar/:
    get:
      operationId: meetings_calendar_retrieve
      description: Единые правила видимости встреч для календаря, списка и detail.
      summary: Календарь встреч за месяц или период
      parameters:
      - in: query
        name: date_after
        schema:
          type: string
          format: date
        description: Начало произвольного периода.
      - in: query
        name: date_before
        schema:
          type: string
          format: date
        description: Конец произвольного периода.
      - in: query
        name: manager
        schema:
          type: integer
        description: ID менеджера MAG. Доступно lead/admin; менеджер всегда видит
          только себя.
      - in: query
        name: month
        schema:
          type: integer
        description: Месяц 1-12.
      - in: query
        name: year
        schema:
          type: integer
        description: Год календарного месяца.
      tags:
      - meetings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingCalendarResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
  /api/v1/notifications/:
    get:
      operationId: notifications_list
      description: До 100 записей, без пагинации.
      summary: Список уведомлений текущего пользователя
      parameters:
      - in: query
        name: unread_only
        schema:
          type: boolean
        description: 1 / true / yes — только непрочитанные
      tags:
      - notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
          description: ''
  /api/v1/notifications/mark-read/:
    post:
      operationId: notifications_mark_read_create
      summary: Отметить уведомления прочитанными
      tags:
      - notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationMarkReadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NotificationMarkReadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NotificationMarkReadRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkedReadResponse'
          description: ''
  /api/v1/projects/:
    get:
      operationId: projects_list
      description: 'Фильтры: event_date_after, event_date_before, stage, stage__in,
        plum_event_status, plum_event_status__in, ordering (напр. plum_event_status,
        -event_date), mag_manager, hall_id, loft_id, hall (подстрока в названии зала),
        loft (подстрока в названии лофта), archived_only (true — только архив). По
        умолчанию проекты в стадии archived не возвращаются. Пагинация: limit, offset
        (LimitOffset, по умолчанию limit=10). В элементе списка: halls[] (внутренние
        hall_id/loft_id MAG), `mag_manager` — объект `{id, full_name, email}` или
        null (назначенный в MAG); `plum_mag_manager` — текст из Plum (справочно).
        sync_error — предупреждение синка (напр. зал не в каталоге).'
      summary: Список проектов
      parameters:
      - in: query
        name: archived_only
        schema:
          type: boolean
        description: true — только проекты в стадии archived; по умолчанию archived
          скрыты
      - in: query
        name: event_date_after
        schema:
          type: string
          format: date
        description: event_date >= (ISO yyyy-MM-dd)
      - in: query
        name: event_date_before
        schema:
          type: string
          format: date
        description: event_date <= (ISO yyyy-MM-dd)
      - in: query
        name: hall
        schema:
          type: string
        description: Подстрока в event_halls.hall.name
      - in: query
        name: hall_id
        schema:
          type: integer
        description: 'Фильтр: проект содержит зал с этим id (event_halls)'
      - in: query
        name: limit
        schema:
          type: integer
      - in: query
        name: loft
        schema:
          type: string
        description: Подстрока в event_halls.loft.name
      - in: query
        name: loft_id
        schema:
          type: integer
        description: 'Фильтр: проект содержит лофт с этим id (event_halls)'
      - in: query
        name: mag_manager
        schema:
          type: integer
      - in: query
        name: offset
        schema:
          type: integer
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Сортировка: поля модели, напр. -event_date, plum_event_status,
          -plum_event_status (по числовому коду статуса)'
      - in: query
        name: out_of_mag_reason
        schema:
          type: string
      - in: query
        name: plum_event_status
        schema:
          type: integer
        description: Статус мероприятия в Plum (число, как в поле plum_event_status
          ответа)
      - in: query
        name: plum_event_status__in
        schema:
          type: string
        description: Несколько статусов Plum через запятую (напр. 4,6,10)
      - in: query
        name: search
        schema:
          type: string
        description: Поиск по названию проекта (event_name, icontains)
      - in: query
        name: stage
        schema:
          type: string
          enum:
          - archived
          - bonus_approved
          - bonus_calculated
          - calculation_prepared
          - closed
          - contract_signed
          - data_confirmed
          - documents_confirmed
          - event_held
          - expenses_entered
          - feedback_received
          - out_of_mag_scope
          - plum_request
          - primary_contact_done
          - ready_to_event
        description: Фильтр по одной стадии (для колонок канбана)
      - in: query
        name: stage__in
        schema:
          type: string
        description: Несколько стадий через запятую
      - in: query
        name: transferred_at_after
        schema:
          type: string
          format: date-time
      - in: query
        name: transferred_at_before
        schema:
          type: string
          format: date-time
      - in: query
        name: transferred_by
        schema:
          type: integer
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectList'
          description: ''
    post:
      operationId: projects_create
      description: 'Ручное создание (не из Plum). **Тело:** `event_type` (обяз.),
        `event_name` или `title` (обяз.), `hall_ids` — внутренние id из `GET /api/v1/halls/halls/`
        (минимум один) или alias `hall_id`; опционально `event_date` (иначе сегодня).
        **Ответ 201:** `ProjectSerializer` с `halls[]`. Менеджер MAG: создатель =
        `mag_manager`; lead: из матрицы залов. Доступ: менеджер MAG, руководитель.'
      summary: Создать проект вручную
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
            examples:
              НовыйПроект(несколькоЗалов):
                value:
                  title: Корпоратив Acme
                  event_type: 3
                  hall_ids:
                  - 10
                  - 11
                summary: Новый проект (несколько залов)
              НовыйПроект(одинЗал,AliasHallId):
                value:
                  event_name: День рождения
                  event_type: 1
                  hall_id: 10
