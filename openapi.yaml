openapi: 3.0.3
info:
  title: MAG Backend API
  version: 1.0.0
  description: REST API v1 (JWT).
paths:
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
        - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
        - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
        - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/projects/:
    get:
      operationId: projects_list
      description: 'Фильтры: event_date_after, event_date_before, stage, stage__in,
        plum_status, plum_status__in. Пагинация: limit, offset.'
      summary: Список проектов
      parameters:
        - in: query
          name: event_date_after
          schema:
            type: string
            format: date
          description: event_date >= (ISO yyyy-MM-dd)
        - in: query
          name: event_date_before
          schema:
            type: string
            format: date
          description: event_date <= (ISO yyyy-MM-dd)
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: ordering
          schema:
            type: string
        - in: query
          name: plum_status
          schema:
            type: integer
          description: Статус мероприятия в Plum (число)
        - in: query
          name: plum_status__in
          schema:
            type: string
          description: Несколько статусов Plum через запятую
        - in: query
          name: stage
          schema:
            type: string
            enum:
              - archived
              - bonus_approved
              - bonus_calculated
              - calculation_prepared
              - closed
              - contract_signed
              - data_confirmed
              - documents_confirmed
              - event_held
              - expenses_entered
              - feedback_received
              - out_of_mag_scope
              - plum_request
              - primary_contact_done
              - ready_to_event
          description: Фильтр по одной стадии (для колонок канбана)
        - in: query
          name: stage__in
          schema:
            type: string
          description: Несколько стадий через запятую
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectList'
          description: ''
    post:
      operationId: projects_create
      description: 'Форма «Новый проект»: название, тип, лофт, зал. Дата мероприятия
        — сегодня, если event_date не передан. Доступ: менеджер MAG, руководитель.'
      summary: Создать проект вручную
      tags:
        - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
            examples:
              НовыйПроект:
                value:
                  title: Корпоратив Acme
                  event_type: 3
                  loft: LOFT#1
                  hall: MAIN
                summary: Новый проект
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
        required: true
      security:
        - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
  /api/v1/projects/{id}/:
    get:
      operationId: projects_retrieve
      summary: Карточка проекта
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailSchema'
          description: ''
    put:
      operationId: projects_update
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      security:
        - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
    patch:
      operationId: projects_partial_update
      summary: Обновить клиентские поля
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProjectRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProjectRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProjectRequest'
      security:
        - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
  /api/v1/projects/{id}/backline/:
    post:
      operationId: projects_backline_create
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: projects_backline_destroy
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/projects/{id}/documents/:
    patch:
      operationId: projects_documents_partial_update
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/expenses/:
    patch:
      operationId: projects_expenses_partial_update
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/pipeline/:
    get:
      operationId: projects_pipeline_retrieve
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/sales/:
    get:
      operationId: projects_sales_retrieve
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: projects_sales_partial_update
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/transition/:
    post:
      operationId: projects_transition_create
      description: POST /transition/ — alias; предпочтительно /transitions/.
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/transitions/:
    post:
      operationId: projects_transitions_create
      description: 'Сохраняет поля текущего этапа и переводит проект в `to_stage`.
        Тело плоское: `{ to_stage, ...поля }`. См. docs/api/stages.md.'
      summary: Переход на следующий этап
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      tags:
        - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectTransitionRequest'
            examples:
              PlumRequest→PrimaryContactDone:
                value:
                  to_stage: primary_contact_done
                  client_company: ООО Ромашка
                  phone: '+79991234567'
                  contact_person: Иван Иванов
                  email: ivan@example.com
                summary: plum_request → primary_contact_done
              PrimaryContactDone→CalculationPrepared:
                value:
                  to_stage: calculation_prepared
                  contact_comment: Созвонились, ждём ТЗ
                  contact_channel: phone
                summary: primary_contact_done → calculation_prepared
              CalculationPrepared→ContractSigned:
                value:
                  to_stage: contract_signed
                  calculation_comment: Смета согласована с клиентом
                summary: calculation_prepared → contract_signed
              ContractSigned→ReadyToEvent:
                value:
                  to_stage: ready_to_event
                  contract_type: with_vat
                  contract_number: MAG-2026-042
                  contract_date: '2026-05-01'
                  legal_entity: ООО MAG
                  contract_comment: Договор на площадке
                summary: contract_signed → ready_to_event
              ReadyToEvent→EventHeld:
                value:
                  to_stage: event_held
                  tax_rate: 10
                  articles:
                    - block: main
                      kind: equipment
                      sales: 1500000
                    - block: main
                      kind: personnel
                      sales: 350000
                summary: ready_to_event → event_held
              Предпроект→OutOfMagScope:
                value:
                  to_stage: out_of_mag_scope
                  reason: event_cancelled
                  comment: Клиент отменил дату
                summary: предпроект → out_of_mag_scope
              OutOfMagScope→ReturnFromOutOfMag:
                value:
                  to_stage: return_from_out_of_mag
                  target_stage: calculation_prepared
                  comment: Вернули в работу
                summary: out_of_mag_scope → return_from_out_of_mag
              EventHeld→ExpensesEntered:
                value:
                  to_stage: expenses_entered
                  post_event_comment: Мероприятие прошло без замечаний
                summary: event_held → expenses_entered
              ExpensesEntered→DocumentsConfirmed:
                value:
                  to_stage: documents_confirmed
                  expenses_comment: Расходы сверены с бухгалтерией
                  articles:
                    - block: main
                      kind: equipment
                      expense: 800000
                    - block: main
                      kind: personnel
                      expense: 200000
                summary: expenses_entered → documents_confirmed
              DocumentsConfirmed→DataConfirmed:
                value:
                  to_stage: data_confirmed
                  project_docs_status: present
                  sublease_docs_status: not_required
                  staff_receipts_status: present
                summary: documents_confirmed → data_confirmed
              FeedbackReceived→DataConfirmed(legacy):
                value:
                  to_stage: data_confirmed
                summary: feedback_received → data_confirmed (legacy)
              DataConfirmed→BonusCalculated:
                value:
                  to_stage: bonus_calculated
                  data_confirmed_status: confirmed
                summary: data_confirmed → bonus_calculated
              BonusCalculated→BonusApproved:
                value:
                  to_stage: bonus_approved
                  articles:
                    - block: main
                      kind: equipment
                      bonus_amount: 70000
                summary: bonus_calculated → bonus_approved
              BonusApproved→Closed:
                value:
                  to_stage: closed
                summary: bonus_approved → closed
              RejectData(откатДанных):
                value:
                  to_stage: reject_data
                summary: reject_data (откат данных)
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectTransitionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectTransitionRequest'
        required: true
      security:
        - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailSchema'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineError'
          description: ''
  /api/v1/projects/legal-entities/:
    get:
      operationId: projects_legal_entities_list
      summary: Справочник юрлиц MAG
      tags:
        - projects
      security:
        - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LegalEntity'
          description: ''
  /api/v1/users/me/:
    get:
      operationId: users_me_retrieve
      summary: Текущий пользователь
      tags:
        - users
      security:
        - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeSchema'
          description: ''
components:
  schemas:
    BlockEnum:
      enum:
        - main
        - backline
      type: string
      description: |-
        * `main` - main
        * `backline` - backline
    ContactChannelEnum:
      enum:
        - messenger
        - phone
        - meeting
      type: string
      description: |-
        * `messenger` - messenger
        * `phone` - phone
        * `meeting` - meeting
    ContractTypeEnum:
      enum:
        - with_vat
        - without_vat
      type: string
      description: |-
        * `with_vat` - С НДС
        * `without_vat` - Без НДС
    DataConfirmedStatusEnum:
      enum:
        - confirmed
        - rejected
      type: string
      description: |-
        * `confirmed` - confirmed
        * `rejected` - rejected
    EmailTokenObtainPairRequest:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
        - email
        - password
    KindEnum:
      enum:
        - equipment
        - personnel
        - sublease
        - transport
        - consumables
        - tm
        - internet
        - screen
      type: string
      description: |-
        * `equipment` - equipment
        * `personnel` - personnel
        * `sublease` - sublease
        * `transport` - transport
        * `consumables` - consumables
        * `tm` - tm
        * `internet` - internet
        * `screen` - screen
    LastActiveStageEnum:
      enum:
        - plum_request
        - primary_contact_done
        - calculation_prepared
        - contract_signed
        - ready_to_event
        - event_held
        - expenses_entered
        - documents_confirmed
        - feedback_received
        - data_confirmed
        - bonus_calculated
        - bonus_approved
        - closed
        - archived
        - out_of_mag_scope
      type: string
      description: |-
        * `plum_request` - Заявка из Plum
        * `primary_contact_done` - Первичный контакт выполнен
        * `calculation_prepared` - Расчёт подготовлен
        * `contract_signed` - Договор подписан
        * `ready_to_event` - Готов к проведению
        * `event_held` - Мероприятие проведено
        * `expenses_entered` - Расходы внесены
        * `documents_confirmed` - Документы подтверждены
        * `feedback_received` - Обратная связь по проекту получена
        * `data_confirmed` - Данные подтверждены
        * `bonus_calculated` - Бонус рассчитан
        * `bonus_approved` - Бонус утверждён
        * `closed` - Проект закрыт
        * `archived` - Архив
        * `out_of_mag_scope` - Вне контура MAG
    LegalEntity:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название юрлица
          maxLength: 500
        inn:
          type: string
          title: ИНН
          maxLength: 12
        kpp:
          type: string
          title: КПП
          maxLength: 9
        ogrn:
          type: string
          title: ОГРН
          maxLength: 15
        legal_address:
          type: string
          title: Юридический адрес
        bank_details:
          type: string
          title: Банковские реквизиты
        signatory:
          type: string
          title: Подписант
          maxLength: 500
        is_active:
          type: boolean
          title: Активно
      required:
        - id
        - inn
        - name
    NullEnum:
      enum:
        - null
    PaginatedProjectList:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    PatchedProjectRequest:
      type: object
      properties:
        client_company:
          type: string
          title: Клиент / название компании (редактируемое)
          maxLength: 500
        contact_person:
          type: string
          title: Контактное лицо (редактируемое)
          maxLength: 500
        phone:
          type: string
          title: Телефон (редактируемый)
          maxLength: 64
        email:
          type: string
          format: email
          title: Email (редактируемый)
          maxLength: 254
    PipelineError:
      type: object
      properties:
        detail:
          type: string
        code:
          type: string
          description: forbidden | validation | invalid_transition | not_implemented
            | ...
      required:
        - detail
    Project:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        plum_event_id:
          type: string
          readOnly: true
          title: ID мероприятия Plum
        plum_card_url:
          type: string
          format: uri
          readOnly: true
          title: Ссылка на карточку Plum
        plum_last_synced_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата последней синхронизации
        plum_event_payload_hash:
          type: string
          readOnly: true
          title: SHA-256 нормализованного JSON мероприятия Plum
        event_name:
          type: string
          readOnly: true
          title: Название мероприятия
        event_date:
          type: string
          format: date
          readOnly: true
          title: Дата мероприятия
        venue:
          type: string
          readOnly: true
          title: Площадка
        hall_loft:
          type: string
          readOnly: true
          title: Зал / лофт
        city:
          type: string
          readOnly: true
          title: Город
        city_label:
          type: string
          readOnly: true
        event_type:
          type: integer
          readOnly: true
          nullable: true
          title: Тип мероприятия Plum (код)
        event_type_label:
          type: string
          readOnly: true
        event_format:
          type: integer
          readOnly: true
          nullable: true
          title: Формат мероприятия Plum (код)
        event_format_label:
          type: string
          readOnly: true
        plum_event_status:
          type: string
          readOnly: true
          title: Статус мероприятия в Plum
        plum_event_status_label:
          type: string
          readOnly: true
        plum_comment:
          type: string
          readOnly: true
          title: Комментарий из Plum
        plum_client_company:
          type: string
          readOnly: true
          title: Клиент / название компании
        plum_contact_person:
          type: string
          readOnly: true
          title: Контактное лицо
        plum_phone:
          type: string
          readOnly: true
          title: Телефон
        plum_email:
          type: string
          format: email
          readOnly: true
          title: Email
        plum_lofthall_manager:
          type: string
          readOnly: true
          title: Менеджер LOFT HALL
        plum_mag_manager:
          type: string
          readOnly: true
          title: Менеджер MAG (Plum)
        client_company:
          type: string
          title: Клиент / название компании (редактируемое)
          maxLength: 500
        contact_person:
          type: string
          title: Контактное лицо (редактируемое)
          maxLength: 500
        phone:
          type: string
          title: Телефон (редактируемый)
          maxLength: 64
        email:
          type: string
          format: email
          title: Email (редактируемый)
          maxLength: 254
        mag_manager:
          type: string
          readOnly: true
        mag_manager_email:
          type: string
          format: email
          readOnly: true
          nullable: true
        stage:
          allOf:
            - $ref: '#/components/schemas/StageEnum'
          readOnly: true
          title: Стадия проекта
        last_active_stage:
          allOf:
            - $ref: '#/components/schemas/LastActiveStageEnum'
          readOnly: true
          title: Последняя активная стадия
        source_payload:
          readOnly: true
          title: Последний payload Plum
        sync_error:
          type: string
          readOnly: true
          title: Ошибка последней синхронизации
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата создания проекта в ERP
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - city
        - city_label
        - created_at
        - event_date
        - event_format
        - event_format_label
        - event_name
        - event_type
        - event_type_label
        - hall_loft
        - id
        - last_active_stage
        - mag_manager
        - mag_manager_email
        - plum_card_url
        - plum_client_company
        - plum_comment
        - plum_contact_person
        - plum_email
