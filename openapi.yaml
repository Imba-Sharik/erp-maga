components:
  schemas:
    EmailTokenObtainPairRequest:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    LastActiveStageEnum:
      enum:
      - plum_request
      - primary_contact_done
      - calculation_prepared
      - contract_signed
      - ready_to_event
      - event_held
      - expenses_entered
      - documents_confirmed
      - feedback_received
      - data_confirmed
      - bonus_calculated
      - bonus_approved
      - closed
      - archived
      - out_of_mag_scope
      type: string
      description: |-
        * `plum_request` - Заявка из Plum
        * `primary_contact_done` - Первичный контакт выполнен
        * `calculation_prepared` - Расчёт подготовлен
        * `contract_signed` - Договор подписан
        * `ready_to_event` - Готов к проведению
        * `event_held` - Мероприятие проведено
        * `expenses_entered` - Расходы внесены
        * `documents_confirmed` - Документы подтверждены
        * `feedback_received` - Обратная связь по проекту получена
        * `data_confirmed` - Данные подтверждены
        * `bonus_calculated` - Бонус рассчитан
        * `bonus_approved` - Бонус утверждён
        * `closed` - Проект закрыт
        * `archived` - Архив
        * `out_of_mag_scope` - Вне контура MAG
    PaginatedProjectList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    PatchedProjectRequest:
      type: object
      properties:
        client_company:
          type: string
          title: Клиент / название компании (редактируемое)
          maxLength: 500
        contact_person:
          type: string
          title: Контактное лицо (редактируемое)
          maxLength: 500
        phone:
          type: string
          title: Телефон (редактируемый)
          maxLength: 64
        email:
          type: string
          format: email
          title: Email (редактируемый)
          maxLength: 254
    Project:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        plum_event_id:
          type: string
          readOnly: true
          title: ID мероприятия Plum
        plum_card_url:
          type: string
          format: uri
          readOnly: true
          title: Ссылка на карточку Plum
        plum_last_synced_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата последней синхронизации
        plum_event_payload_hash:
          type: string
          readOnly: true
          title: SHA-256 нормализованного JSON мероприятия Plum
        event_name:
          type: string
          readOnly: true
          title: Название мероприятия
        event_date:
          type: string
          format: date
          readOnly: true
          title: Дата мероприятия
        venue:
          type: string
          readOnly: true
          title: Площадка
        hall_loft:
          type: string
          readOnly: true
          title: Зал / лофт
        city:
          type: string
          readOnly: true
          title: Город
        city_label:
          type: string
          readOnly: true
        event_type:
          type: integer
          readOnly: true
          nullable: true
          title: Тип мероприятия Plum (код)
        event_type_label:
          type: string
          readOnly: true
        event_format:
          type: integer
          readOnly: true
          nullable: true
          title: Формат мероприятия Plum (код)
        event_format_label:
          type: string
          readOnly: true
        plum_event_status:
          type: string
          readOnly: true
          title: Статус мероприятия в Plum
        plum_event_status_label:
          type: string
          readOnly: true
        plum_comment:
          type: string
          readOnly: true
          title: Комментарий из Plum
        plum_client_company:
          type: string
          readOnly: true
          title: Клиент / название компании
        plum_contact_person:
          type: string
          readOnly: true
          title: Контактное лицо
        plum_phone:
          type: string
