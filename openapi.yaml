components:
  schemas:
    BlockEnum:
      enum:
      - main
      - backline
      type: string
      description: |-
        * `main` - main
        * `backline` - backline
    ContactChannelEnum:
      enum:
      - messenger
      - phone
      - meeting
      type: string
      description: |-
        * `messenger` - messenger
        * `phone` - phone
        * `meeting` - meeting
    ContractTypeEnum:
      enum:
      - with_vat
      - without_vat
      type: string
      description: |-
        * `with_vat` - –° –Э–Ф–°
        * `without_vat` - –С–µ–Ј –Э–Ф–°
    DataConfirmedStatusEnum:
      enum:
      - confirmed
      - rejected
      type: string
      description: |-
        * `confirmed` - confirmed
        * `rejected` - rejected
    EmailTokenObtainPairRequest:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    KindEnum:
      enum:
      - equipment
      - personnel
      - sublease
      - transport
      - consumables
      - tm
      - internet
      - screen
      type: string
      description: |-
        * `equipment` - equipment
        * `personnel` - personnel
        * `sublease` - sublease
        * `transport` - transport
        * `consumables` - consumables
        * `tm` - tm
        * `internet` - internet
        * `screen` - screen
    LastActiveStageEnum:
      enum:
      - plum_request
      - primary_contact_done
      - calculation_prepared
      - contract_signed
      - ready_to_event
      - event_held
      - expenses_entered
      - documents_confirmed
      - feedback_received
      - data_confirmed
      - bonus_calculated
      - bonus_approved
      - closed
      - archived
      - out_of_mag_scope
      type: string
      description: |-
        * `plum_request` - –Ч–∞—П–≤–Ї–∞ –Є–Ј Plum
        * `primary_contact_done` - –Я–µ—А–≤–Є—З–љ—Л–є –Ї–Њ–љ—В–∞–Ї—В –≤—Л–њ–Њ–ї–љ–µ–љ
        * `calculation_prepared` - –†–∞—Б—З—С—В –њ–Њ–і–≥–Њ—В–Њ–≤–ї–µ–љ
        * `contract_signed` - –Ф–Њ–≥–Њ–≤–Њ—А –њ–Њ–і–њ–Є—Б–∞–љ
        * `ready_to_event` - –У–Њ—В–Њ–≤ –Ї –њ—А–Њ–≤–µ–і–µ–љ–Є—О
        * `event_held` - –Ь–µ—А–Њ–њ—А–Є—П—В–Є–µ –њ—А–Њ–≤–µ–і–µ–љ–Њ
        * `expenses_entered` - –†–∞—Б—Е–Њ–і—Л –≤–љ–µ—Б–µ–љ—Л
        * `documents_confirmed` - –Ф–Њ–Ї—Г–Љ–µ–љ—В—Л –њ–Њ–і—В–≤–µ—А–ґ–і–µ–љ—Л
        * `feedback_received` - –Ю–±—А–∞—В–љ–∞—П —Б–≤—П–Ј—М –њ–Њ –њ—А–Њ–µ–Ї—В—Г –њ–Њ–ї—Г—З–µ–љ–∞
        * `data_confirmed` - –Ф–∞–љ–љ—Л–µ –њ–Њ–і—В–≤–µ—А–ґ–і–µ–љ—Л
        * `bonus_calculated` - –С–Њ–љ—Г—Б —А–∞—Б—Б—З–Є—В–∞–љ
        * `bonus_approved` - –С–Њ–љ—Г—Б —Г—В–≤–µ—А–ґ–і—С–љ
        * `closed` - –Я—А–Њ–µ–Ї—В –Ј–∞–Ї—А—Л—В
        * `archived` - –Р—А—Е–Є–≤
        * `out_of_mag_scope` - –Т–љ–µ –Ї–Њ–љ—В—Г—А–∞ MAG
    LegalEntity:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: –Э–∞–Ј–≤–∞–љ–Є–µ —О—А–ї–Є—Ж–∞
          maxLength: 500
        inn:
          type: string
          title: –Ш–Э–Э
          maxLength: 12
        kpp:
          type: string
          title: –Ъ–Я–Я
          maxLength: 9
        ogrn:
          type: string
          title: –Ю–У–†–Э
          maxLength: 15
        legal_address:
          type: string
          title: –Ѓ—А–Є–і–Є—З–µ—Б–Ї–Є–є –∞–і—А–µ—Б
        bank_details:
          type: string
          title: –С–∞–љ–Ї–Њ–≤—Б–Ї–Є–µ —А–µ–Ї–≤–Є–Ј–Є—В—Л
        signatory:
          type: string
          title: –Я–Њ–і–њ–Є—Б–∞–љ—В
          maxLength: 500
        is_active:
          type: boolean
          title: –Р–Ї—В–Є–≤–љ–Њ
      required:
      - id
      - inn
      - name
    NullEnum:
      enum:
      - null
    PaginatedProjectList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    PatchedProjectRequest:
      type: object
      properties:
        client_company:
          type: string
          title: –Ъ–ї–Є–µ–љ—В / –љ–∞–Ј–≤–∞–љ–Є–µ –Ї–Њ–Љ–њ–∞–љ–Є–Є (—А–µ–і–∞–Ї—В–Є—А—Г–µ–Љ–Њ–µ)
          maxLength: 500
        contact_person:
          type: string
          title: –Ъ–Њ–љ—В–∞–Ї—В–љ–Њ–µ –ї–Є—Ж–Њ (—А–µ–і–∞–Ї—В–Є—А—Г–µ–Љ–Њ–µ)
          maxLength: 500
        phone:
          type: string
          title: –Ґ–µ–ї–µ—Д–Њ–љ (—А–µ–і–∞–Ї—В–Є—А—Г–µ–Љ—Л–є)
          maxLength: 64
        email:
          type: string
          format: email
          title: Email (—А–µ–і–∞–Ї—В–Є—А—Г–µ–Љ—Л–є)
          maxLength: 254
    PipelineError:
      type: object
