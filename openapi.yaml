openapi: 3.0.3
info:
  title: MAG Backend API
  version: 1.0.0
  description: REST API v1 (JWT).
paths:
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/projects/:
    get:
      operationId: projects_list
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectList'
          description: ''
  /api/v1/projects/{id}/:
    get:
      operationId: projects_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
    put:
      operationId: projects_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
    patch:
      operationId: projects_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProjectRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProjectRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProjectRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
  /api/v1/projects/{id}/backline/:
    post:
      operationId: projects_backline_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: projects_backline_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/projects/{id}/documents/:
    patch:
      operationId: projects_documents_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/expenses/:
    patch:
      operationId: projects_expenses_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/pipeline/:
    get:
      operationId: projects_pipeline_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/sales/:
    get:
      operationId: projects_sales_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: projects_sales_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/{id}/transition/:
    post:
      operationId: projects_transition_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/projects/legal-entities/:
    get:
      operationId: projects_legal_entities_retrieve
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/users/me/:
    get:
      operationId: users_me_retrieve
      tags:
      - users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
components:
  schemas:
    EmailTokenObtainPairRequest:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    LastActiveStageEnum:
      enum:
      - plum_request
      - primary_contact_done
      - calculation_prepared
      - contract_signed
      - ready_to_event
      - event_held
      - expenses_entered
      - documents_confirmed
      - feedback_received
      - data_confirmed
      - bonus_calculated
      - bonus_approved
      - closed
      - archived
      - out_of_mag_scope
      type: string
      description: |-
        * `plum_request` - Заявка из Plum
        * `primary_contact_done` - Первичный контакт выполнен
        * `calculation_prepared` - Расчёт подготовлен
        * `contract_signed` - Договор подписан
        * `ready_to_event` - Готов к проведению
        * `event_held` - Мероприятие проведено
        * `expenses_entered` - Расходы внесены
        * `documents_confirmed` - Документы подтверждены
        * `feedback_received` - Обратная связь по проекту получена
        * `data_confirmed` - Данные подтверждены
        * `bonus_calculated` - Бонус рассчитан
        * `bonus_approved` - Бонус утверждён
        * `closed` - Проект закрыт
        * `archived` - Архив
        * `out_of_mag_scope` - Вне контура MAG
    PaginatedProjectList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    PatchedProjectRequest:
      type: object
      properties:
        client_company:
          type: string
          title: Клиент / название компании (редактируемое)
          maxLength: 500
        contact_person:
          type: string
          title: Контактное лицо (редактируемое)
          maxLength: 500
        phone:
          type: string
          title: Телефон (редактируемый)
          maxLength: 64
        email:
          type: string
          format: email
          title: Email (редактируемый)
          maxLength: 254
        mag_manager:
          type: integer
          nullable: true
          title: Менеджер MAG
    Project:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        plum_event_id:
          type: string
          readOnly: true
          title: ID мероприятия Plum
        plum_card_url:
          type: string
          format: uri
          readOnly: true
          title: Ссылка на карточку Plum
        plum_last_synced_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата последней синхронизации
        plum_event_payload_hash:
          type: string
          readOnly: true
          title: SHA-256 нормализованного JSON мероприятия Plum
        event_name:
          type: string
          readOnly: true
          title: Название мероприятия
        event_date:
          type: string
          format: date
          readOnly: true
          title: Дата мероприятия
        venue:
          type: string
          readOnly: true
          title: Площадка
        hall_loft:
          type: string
          readOnly: true
          title: Зал / лофт
        city:
          type: string
          readOnly: true
          title: Город
        city_label:
          type: string
          readOnly: true
        event_type:
          type: integer
          readOnly: true
          nullable: true
          title: Тип мероприятия Plum (код)
        event_type_label:
          type: string
          readOnly: true
        event_format:
          type: integer
          readOnly: true
          nullable: true
          title: Формат мероприятия Plum (код)
        event_format_label:
          type: string
          readOnly: true
        plum_event_status:
          type: string
          readOnly: true
          title: Статус мероприятия в Plum
        plum_event_status_label:
          type: string
          readOnly: true
        plum_comment:
          type: string
          readOnly: true
          title: Комментарий из Plum
        plum_client_company:
          type: string
          readOnly: true
          title: Клиент / название компании
        plum_contact_person:
          type: string
          readOnly: true
          title: Контактное лицо
        plum_phone:
          type: string
          readOnly: true
          title: Телефон
        plum_email:
          type: string
          format: email
          readOnly: true
          title: Email
        plum_lofthall_manager:
          type: string
          readOnly: true
          title: Менеджер LOFT HALL
        plum_mag_manager:
          type: string
          readOnly: true
          title: Менеджер MAG (Plum)
        client_company:
          type: string
          title: Клиент / название компании (редактируемое)
          maxLength: 500
        contact_person:
          type: string
          title: Контактное лицо (редактируемое)
          maxLength: 500
        phone:
          type: string
          title: Телефон (редактируемый)
          maxLength: 64
        email:
          type: string
          format: email
          title: Email (редактируемый)
          maxLength: 254
        mag_manager:
          type: integer
          nullable: true
          title: Менеджер MAG
        mag_manager_email:
          type: string
          format: email
          readOnly: true
          nullable: true
        stage:
          allOf:
          - $ref: '#/components/schemas/StageEnum'
          readOnly: true
          title: Стадия проекта
        last_active_stage:
          allOf:
          - $ref: '#/components/schemas/LastActiveStageEnum'
          readOnly: true
          title: Последняя активная стадия
        source_payload:
          readOnly: true
          title: Последний payload Plum
        sync_error:
          type: string
          readOnly: true
          title: Ошибка последней синхронизации
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата создания проекта в ERP
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - city
      - city_label
      - created_at
      - event_date
      - event_format
      - event_format_label
      - event_name
      - event_type
      - event_type_label
      - hall_loft
      - id
      - last_active_stage
      - mag_manager_email
      - plum_card_url
      - plum_client_company
      - plum_comment
      - plum_contact_person
      - plum_email
      - plum_event_id
      - plum_event_payload_hash
      - plum_event_status
      - plum_event_status_label
      - plum_last_synced_at
      - plum_lofthall_manager
      - plum_mag_manager
      - plum_phone
      - source_payload
      - stage
      - sync_error
      - updated_at
      - venue
    ProjectRequest:
      type: object
      properties:
        client_company:
          type: string
          title: Клиент / название компании (редактируемое)
          maxLength: 500
        contact_person:
          type: string
          title: Контактное лицо (редактируемое)
          maxLength: 500
        phone:
          type: string
          title: Телефон (редактируемый)
          maxLength: 64
        email:
          type: string
          format: email
          title: Email (редактируемый)
          maxLength: 254
        mag_manager:
          type: integer
          nullable: true
          title: Менеджер MAG
    StageEnum:
      enum:
      - plum_request
      - primary_contact_done
      - calculation_prepared
      - contract_signed
      - ready_to_event
      - event_held
      - expenses_entered
      - documents_confirmed
      - feedback_received
      - data_confirmed
      - bonus_calculated
      - bonus_approved
      - closed
      - archived
      - out_of_mag_scope
      type: string
      description: |-
        * `plum_request` - Заявка из Plum
        * `primary_contact_done` - Первичный контакт выполнен
        * `calculation_prepared` - Расчёт подготовлен
        * `contract_signed` - Договор подписан
        * `ready_to_event` - Готов к проведению
        * `event_held` - Мероприятие проведено
        * `expenses_entered` - Расходы внесены
        * `documents_confirmed` - Документы подтверждены
        * `feedback_received` - Обратная связь по проекту получена
        * `data_confirmed` - Данные подтверждены
        * `bonus_calculated` - Бонус рассчитан
        * `bonus_approved` - Бонус утверждён
        * `closed` - Проект закрыт
        * `archived` - Архив
        * `out_of_mag_scope` - Вне контура MAG
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    TokenVerifyRequest:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - token
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        username:
          type: string
          readOnly: true
          title: Имя пользователя
          description: Обязательное поле. Не более 150 символов. Только буквы, цифры
            и символы @/./+/-/_.
        first_name:
          type: string
          readOnly: true
          title: Имя
        last_name:
          type: string
          readOnly: true
          title: Фамилия
        is_staff:
          type: boolean
          readOnly: true
          title: Статус персонала
          description: Отметьте, если пользователь может входить в административную
            часть сайта.
        date_joined:
          type: string
          format: date-time
          readOnly: true
          title: Дата регистрации
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date_joined
      - email
      - first_name
      - id
      - is_staff
      - last_name
      - updated_at
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
