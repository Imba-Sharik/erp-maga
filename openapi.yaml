  /api/v1/projects/:
    get:
      operationId: projects_list
      description: 'Фильтры: event_date_after, event_date_before, stage, stage__in,
        plum_status, plum_status__in. Пагинация: limit, offset.'
      summary: Список проектов
      parameters:
      - in: query
        name: event_date_after
        schema:
          type: string
          format: date
        description: event_date >= (ISO yyyy-MM-dd)
      - in: query
        name: event_date_before
        schema:
          type: string
          format: date
        description: event_date <= (ISO yyyy-MM-dd)
      - in: query
        name: hall_loft
        schema:
          type: string
      - in: query
        name: limit
        schema:
          type: integer
      - in: query
        name: mag_manager
        schema:
          type: integer
      - in: query
        name: offset
        schema:
          type: integer
      - in: query
        name: ordering
        schema:
          type: string
      - in: query
        name: out_of_mag_reason
        schema:
          type: string
      - in: query
        name: plum_status
        schema:
          type: integer
        description: Статус мероприятия в Plum (число)
      - in: query
        name: plum_status__in
        schema:
          type: string
        description: Несколько статусов Plum через запятую
      - in: query
        name: stage
        schema:
          type: string
          enum:
          - archived
          - bonus_approved
          - bonus_calculated
          - calculation_prepared
          - closed
          - contract_signed
          - data_confirmed
          - documents_confirmed
          - event_held
          - expenses_entered
          - feedback_received
          - out_of_mag_scope
          - plum_request
          - primary_contact_done
          - ready_to_event
        description: Фильтр по одной стадии (для колонок канбана)
      - in: query
        name: stage__in
        schema:
          type: string
        description: Несколько стадий через запятую
      - in: query
        name: transferred_at_after
        schema:
          type: string
          format: date-time
      - in: query
        name: transferred_at_before
        schema:
          type: string
          format: date-time
      - in: query
        name: transferred_by
        schema:
          type: integer
      - in: query
        name: venue
        schema:
          type: string
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectList'
          description: ''
    post:
      operationId: projects_create
      description: 'Форма «Новый проект»: название, тип, лофт, зал. Дата мероприятия
        — сегодня, если event_date не передан. Доступ: менеджер MAG, руководитель.'
      summary: Создать проект вручную
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
            examples:
              НовыйПроект:
                value:
                  title: Корпоратив Acme
                  event_type: 3
                  loft: LOFT#1
                  hall: MAIN
                summary: Новый проект
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
